services:
  db:
    container_name: disciplina_me_db
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: postgres
    restart: always

  auth-service:
    container_name: disciplina_me_auth
    build: ./disciplinaMeAuth
    volumes:
      - ./disciplinaMeAuth:/app
    ports:
      - "8001:8000"
    depends_on:
      - db
    environment:
      SECRET_KEY: ${AUTH_SECRET_KEY}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${AUTH_DB_NAME}
      DB_HOST: ${DB_HOST}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
    command: >
      sh -c "sleep 3 &&
             python manage.py migrate &&
             python manage.py createsuperuser --noinput || true &&
             python manage.py runserver 0.0.0.0:8000"

  calendar-service:
    container_name: disciplina_me_calendar
    build: ./disciplinaMeCalendar
    volumes:
      - ./disciplinaMeCalendar:/app
    ports:
      - "8002:8000"
    depends_on:
      - db
    environment:
      SECRET_KEY: ${CALENDAR_SECRET_KEY}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${CALENDAR_DB_NAME}
      DB_HOST: ${DB_HOST}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
    command: >
      sh -c "sleep 3 &&
             python manage.py migrate &&
             python manage.py createsuperuser --noinput || true &&
             python manage.py runserver 0.0.0.0:8000"

  subjects-service:
    container_name: disciplina_me_subjects
    build: ./disciplinaMeSubjects
    volumes:
      - ./disciplinaMeSubjects:/app
    ports:
      - "8003:8000"
    depends_on:
      - db
    environment:
      SECRET_KEY: ${SUBJECTS_SECRET_KEY}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USER: ${DB_USER}
      DB_NAME: ${SUBJECTS_DB_NAME}
      DB_HOST: ${DB_HOST}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
    command: >
      sh -c "sleep 3 &&
             python manage.py migrate &&
             python manage.py createsuperuser --noinput || true &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
